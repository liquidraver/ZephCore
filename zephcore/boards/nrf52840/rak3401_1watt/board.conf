# RAK3401 1W (nRF52840 + SX1262 + SKY66122 1W PA)
# Board-specific configuration
#
# Hardware:
# - nRF52840 SoC, SX1262 LoRa via RAK13302 IO-slot module (30 dBm)
# - SKY66122 1W PA/LNA FEM, enabled via SX126X_POWER_EN on P0.21
# - RAK1910 GPS on UART0 (Slot A) - u-blox MAX-7Q at 9600 baud (optional)
# - Battery ADC on AIN3 (P0.05)
# - I2C0 for WisBlock sensors (auto-detected)
# - LEDs: GREEN=P1.03 (TX), BLUE=P1.04 (status)
# - No display, QSPI disabled (conflicts with LoRa SPI)
# - SoftDevice s140 v6.1.1, UF2 bootloader

# Board identification (matches Arduino MeshCore variant name)
CONFIG_ZEPHCORE_BOARD_NAME="RAK 3401"

# Device Information Service model name
CONFIG_BT_DIS_MODEL_NUMBER_STR="RAK3401 1W"

# SoftDevice firmware ID (s140 v6.1.1)
CONFIG_ZEPHCORE_SD_FWID=0x00B6
